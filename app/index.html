<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AgriSphere — AI Circular Agriculture Platform</title>
    <meta name="description" content="AgriSphere is an AI-powered circular agriculture platform that transforms agricultural waste into valuable economic resources for Philippine farmers." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

            <span class="status-time" id="status-time">9:41</span>

                <rect x="0" y="3" width="3" height="9" rx="1" fill="white" opacity="0.4"/>
                <rect x="4" y="2" width="3" height="10" rx="1" fill="white" opacity="0.6"/>
                <rect x="8" y="0" width="3" height="12" rx="1" fill="white" opacity="0.8"/>
                <rect x="12" y="0" width="3" height="12" rx="1" fill="white"/>
              </svg>
              <svg width="16" height="12" viewBox="0 0 16 12" fill="white">

              <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
                <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
                <rect x="2" y="2" width="16" height="8" rx="2" fill="white"/>
                <path d="M23 4v4a2 2 0 000-4z" fill="white" fill-opacity="0.4"/>
              </svg>
            </div>
          </div>

          <!-- App views container -->
          <div id="app" class="app-container"></div>

          <!-- Bottom Navigation -->
          <nav class="bottom-nav" id="bottom-nav">
            <div class="nav-item active" data-view="home" id="nav-home">
              <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>

                </svg>
              </div>
              <span>Home</span>
            </div>
            <div class="nav-item" data-view="ai-chat" id="nav-ai-chat">
              <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                  <path d="M9 10h.01"></path>

            </div>

              </div>
              <span>Scanner</span>
            </div>
            <div class="nav-item" data-view="marketplace" id="nav-marketplace">
              <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>

              </div>
              <span>Market</span>
            </div>
            <div class="nav-item" data-view="profile" id="nav-profile">
              <div class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <span>Profile</span>
            </div>
          </nav>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
